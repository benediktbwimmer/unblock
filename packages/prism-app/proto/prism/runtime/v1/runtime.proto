syntax = "proto3";

package prism.runtime.v1;

service RuntimeService {
  rpc Health(HealthRequest) returns (HealthResponse);
  rpc ActiveManifest(ActiveManifestRequest) returns (ActiveManifestResponse);
  rpc ExecuteCommand(ExecuteCommandRequest) returns (ExecuteCommandResponse);
  rpc SubmitSemanticCommit(SubmitSemanticCommitRequest) returns (SubmitSemanticCommitResponse);
  rpc CompileRuntimeQueryFragment(CompileRuntimeQueryFragmentRequest) returns (CompileRuntimeQueryFragmentResponse);
  rpc StoreRuntimeQueryFragment(StoreRuntimeQueryFragmentRequest) returns (RuntimeQueryFragmentResponse);
  rpc UpsertRuntimeQueryFragmentUse(UpsertRuntimeQueryFragmentUseRequest) returns (RuntimeQueryFragmentUseResponse);
  rpc Query(QueryRequest) returns (QueryResponse);
  rpc ReadObject(ReadObjectRequest) returns (ObjectResponse);
  rpc ReadRelation(ReadRelationRequest) returns (RelationResponse);
  rpc ReadSubjectTags(SubjectTagsRequest) returns (SubjectTagsResponse);
  rpc FindSubjectsByTag(TagSubjectsRequest) returns (TagSubjectsResponse);
  rpc ReadMaterializedSurface(MaterializedSurfaceRequest) returns (MaterializedSurfaceResponse);
  rpc ReadMaterializedSurfaces(MaterializedSurfaceBatchRequest) returns (MaterializedSurfaceBatchResponse);
  rpc StartFlow(FlowStartRequest) returns (FlowStartResponse);
  rpc StartWorkflow(WorkflowStartRequest) returns (WorkflowStartResponse);
  rpc ReadWorkflow(WorkflowReadRequest) returns (WorkflowReadResponse);
  rpc WatchWorkflow(WorkflowWatchRequest) returns (WorkflowReadResponse);
  rpc CancelWorkflow(WorkflowCancelRequest) returns (WorkflowCancelResponse);
  rpc UpdateWorkflowMetadata(WorkflowMetadataUpdateRequest) returns (WorkflowMetadataUpdateResponse);
  rpc EditWorkflow(WorkflowEditRequest) returns (WorkflowEditResponse);
  rpc DrainWorkflows(WorkflowDrainRequest) returns (WorkflowDrainResponse);
  rpc WorkflowBacklog(WorkflowBacklogRequest) returns (WorkflowBacklogResponse);
  rpc WorkflowCatalog(WorkflowCatalogRequest) returns (WorkflowCatalogResponse);
  rpc WorkflowRegistry(WorkflowRegistryRequest) returns (WorkflowRegistryResponse);
  rpc WorkflowLifecycle(WorkflowLifecycleRequest) returns (WorkflowLifecycleResponse);
  rpc AdvanceWorkflowWaits(WorkflowWaitAdvanceRequest) returns (WorkflowWaitAdvanceResponse);
  rpc InspectWorkflows(WorkflowInspectRequest) returns (WorkflowInspectResponse);
  rpc WorkflowRuntimeStatus(WorkflowRuntimeStatusRequest) returns (WorkflowRuntimeStatusResponse);
  rpc WatchObjectProperty(WatchObjectPropertyRequest) returns (stream WatchObjectPropertyResponse);
  rpc WatchObjectProperties(WatchObjectPropertiesRequest) returns (stream WatchObjectPropertiesResponse);
  rpc WatchObjectPropertiesOnce(WatchObjectPropertiesRequest) returns (WatchObjectPropertiesResponse);
  rpc BatchRuntime(RuntimeBatchRequest) returns (RuntimeBatchResponse);
  rpc StreamRuntime(stream RuntimeRequest) returns (stream RuntimeResponse);
  rpc ConnectExecutor(stream ExecutorStreamRequest) returns (stream ExecutorStreamResponse);
}

message HealthRequest {}

message HealthResponse {
  bool ok = 1;
  string runtime_schema = 2;
  bool postgres = 3;
  string observation_json = 4;
}

message ActiveManifestRequest {
  string project_id = 1;
}

message ActiveManifestResponse {
  bool found = 1;
  ActiveManifest manifest = 2;
}

message ActiveManifest {
  string project_id = 1;
  string manifest_hash = 2;
  uint64 app_count = 3;
  uint64 object_count = 4;
  uint64 relation_count = 5;
  uint64 surface_count = 6;
  uint64 job_count = 7;
  uint64 behavior_count = 8;
  uint64 workflow_count = 9;
}

